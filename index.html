<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Wheel</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  </head>
  <body>
    <main class="app">
      <h1>The Wheel</h1>
      <p class="subtitle">Turn boring tasks into fun decisions.</p>

      <section class="controls" aria-label="Task input">
        <form id="task-form">
          <label for="task-input">Add a task</label>
          <div class="input-row">
            <input
              id="task-input"
              type="text"
              placeholder="e.g., Brush Teeth"
              maxlength="80"
              required
            />
            <button type="submit">Add</button>
          </div>
        </form>
        <ul id="task-list" aria-live="polite"></ul>
      </section>

      <section class="wheel-section" aria-label="Task wheel">
        <div class="pointer" aria-hidden="true"></div>
        <canvas
          id="wheel"
          width="420"
          height="420"
          aria-label="Spinning task wheel"
        ></canvas>
        <button id="spin-btn" type="button">Spin the wheel</button>
        <p id="result" class="result" aria-live="polite">
          Add at least 2 tasks to spin.
        </p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
